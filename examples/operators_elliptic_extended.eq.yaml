# 椭圆函数扩展测试
meta:
  id: OPERATORS_ELLIPTIC_EXTENDED
  model: EllipticExtendedOperators
  name_cn: 椭圆函数扩展测试
  version: "1.0"
  description: 测试椭圆函数的别名和扩展

parameters:
  p1:
    name_cn: 模数m
    dtype: float
    default: 0.5
  p2:
    name_cn: 角度phi
    dtype: float
    default: 0.8
  p3:
    name_cn: 参数n
    dtype: float
    default: 0.3

variables:
  y_ellipeinc:
    name_cn: 不完全E别名
    dtype: float
    var_type: output
  y_ellipj:
    name_cn: Jacobi组合
    dtype: float
    var_type: output
  y_ellipkinc:
    name_cn: 不完全K别名
    dtype: float
    var_type: output
  y_elliptic_e_inc:
    name_cn: 不完全E别名2
    dtype: float
    var_type: output
  y_elliptic_f:
    name_cn: 椭圆F别名
    dtype: float
    var_type: output
  y_elliptic_pi:
    name_cn: 椭圆Pi别名
    dtype: float
    var_type: output

equations:
  - id: test_ellipeinc
    name: 不完全E别名
    output: y_ellipeinc
    expression:
      op: ellipeinc
      args:
        - { ref: p2 }
        - { ref: p1 }

  - id: test_ellipj
    name: Jacobi组合
    output: y_ellipj
    expression:
      op: ellipj
      args:
        - { ref: p2 }
        - { ref: p1 }

  - id: test_ellipkinc
    name: 不完全K别名
    output: y_ellipkinc
    expression:
      op: ellipkinc
      args:
        - { ref: p2 }
        - { ref: p1 }

  - id: test_elliptic_e_inc
    name: 不完全E别名2
    output: y_elliptic_e_inc
    expression:
      op: elliptic_e_inc
      args:
        - { ref: p2 }
        - { ref: p1 }

  - id: test_elliptic_f
    name: 椭圆F别名
    output: y_elliptic_f
    expression:
      op: elliptic_f
      args:
        - { ref: p2 }
        - { ref: p1 }

  - id: test_elliptic_pi
    name: 椭圆Pi别名
    output: y_elliptic_pi
    expression:
      op: elliptic_pi
      args:
        - { ref: p3 }
        - { ref: p2 }
        - { ref: p1 }
