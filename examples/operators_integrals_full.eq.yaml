      args:
        - { ref: p1 }

  - id: test_cos_int
    name: 余弦积分
    output: y_cos_int
    expression:
      op: cos_int
      args:
        - { ref: p1 }

  - id: test_ci
    name: 余弦积分别名
    output: y_ci
    expression:
      op: ci
      args:
        - { ref: p1 }

  - id: test_cosint
    name: 余弦积分别名2
    output: y_cosint
    expression:
      op: cosint
      args:
        - { ref: p1 }

  - id: test_shi
    name: 双曲正弦积分
    output: y_shi
