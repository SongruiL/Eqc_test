meta:
  id: GPDEMO3
  model: GpDemo3
  name_cn: GP 合成 demo3（双输入互作门控）—— 进化图论 arc · Tier3 硬过滤/采纳测试靶
  name_en: GP synthetic demo3 — two-input interaction gate (Tier3 hard-filter/adoption test target)
  description: >
    合成双输入互作 demo：真值 y = expit(0.8·(d1 − 15 − d2))——门控阈值随第二热量 d2 漂移，
    故 y 随 d1 **非单调**（d1 高但 d2 更高时门反关，先升后降）。现有形式 = 单输入 d1 的 linear ramp
    （单调递增，永远拟合不了非单调）→ 受约束 GP 必须引入 d2、长出 `d2 → y` 新边。
    用途：验进化图论 arc · Tier3 结构硬过滤（新增边通路 + 系数簇报告）+ 候选采纳闭环。
    合成 demo、非机理模型、无守恒律（meta.balance 空 → 守恒硬过滤诚实跳过）。
  version: "1.0"

variables:
  d1: { type: input,  class: driving,   unit: "℃·d", label: "主驱动 d1",   description: "主热量/时间驱动（单调升）" }
  d2: { type: input,  class: driving,   unit: "℃·d", label: "竞争热量 d2", description: "竞争热量（抬高门控阈值）" }
  y:  { type: output, class: auxiliary, unit: "-",    label: "门控 y",      description: "门控输出 [0,1]", measurable: true }

parameters:
  gate_a: { name_cn: 门控起点,     default: 10.0, unit: "℃·d", provenance: 猜测 }
  gate_b: { name_cn: 门控斜率宽度, default: 8.0,  unit: "℃·d", provenance: 猜测 }

equations:
  - { id: GPDEMO3-GATE, name: 门控输出, output: y, provenance: 猜测,
      reference: "现有形式 = 单输入 d1 linear ramp: clamp((d1−gate_a)/gate_b, 0, 1)；真互作门 = GP 靶点（须引 d2）",
      gp_target: { grammar: monotone_gate, inputs: [d1, d2], output_bounds: [0.0, 1.0], monotone: { d1: increasing } },
      expression: { op: max, args: [ { const: 0 }, { op: min, args: [ { const: 1 },
        { op: div, args: [ { op: sub, args: [ { ref: d1 }, { ref: gate_a } ] }, { ref: gate_b } ] } ] } ] } }
