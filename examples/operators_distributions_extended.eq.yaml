# 分布函数扩展测试
meta:
  id: OPERATORS_DISTRIBUTIONS_EXTENDED
  model: DistributionsExtendedOperators
  name_cn: 分布函数扩展测试
  version: "1.0"
  description: 测试各种概率分布函数

parameters:
  p1:
    name_cn: 输入x
    dtype: float
    default: 1.0
  p2:
    name_cn: 自由度n
    dtype: float
    default: 5.0
  p3:
    name_cn: 参数mu
    dtype: float
    default: 0.0
  p4:
    name_cn: 参数sigma
    dtype: float
    default: 1.0
  p5:
    name_cn: 概率p
    dtype: float
    default: 0.5

variables:
  y_norm_pdf:
    name_cn: 正态PDF
    dtype: float
    var_type: output
  y_norm_cdf:
    name_cn: 正态CDF
    dtype: float
    var_type: output
  y_norm_ppf:
    name_cn: 正态PPF
    dtype: float
    var_type: output
  y_ndtr:
    name_cn: 正态CDF别名
    dtype: float
    var_type: output
  y_ndtri:
    name_cn: 正态PPF别名
    dtype: float
    var_type: output
  y_chi2_pdf:
    name_cn: 卡方PDF
    dtype: float
    var_type: output
  y_chi2_cdf:
    name_cn: 卡方CDF
    dtype: float
    var_type: output
  y_chi2_ppf:
    name_cn: 卡方PPF
    dtype: float
    var_type: output
  y_t_pdf:
    name_cn: t分布PDF
    dtype: float
    var_type: output
  y_t_cdf:
    name_cn: t分布CDF
    dtype: float
    var_type: output
  y_t_ppf:
    name_cn: t分布PPF
    dtype: float
    var_type: output
  y_f_pdf:
    name_cn: F分布PDF
    dtype: float
    var_type: output
  y_f_cdf:
    name_cn: F分布CDF
    dtype: float
    var_type: output
  y_f_ppf:
    name_cn: F分布PPF
    dtype: float
    var_type: output
  y_binomial_pmf:
    name_cn: 二项PMF
    dtype: float
    var_type: output
  y_binomial_cdf:
    name_cn: 二项CDF
    dtype: float
    var_type: output
  y_poisson_pmf:
    name_cn: 泊松PMF
    dtype: float
    var_type: output
  y_poisson_cdf:
    name_cn: 泊松CDF
    dtype: float
    var_type: output
  y_exp_pdf:
    name_cn: 指数PDF
    dtype: float
    var_type: output
  y_exp_cdf:
    name_cn: 指数CDF
    dtype: float
    var_type: output

equations:
  - id: test_norm_pdf
    name: 正态PDF
    output: y_norm_pdf
    expression:
      op: norm_pdf
      args:
        - { ref: p1 }
        - { ref: p3 }
        - { ref: p4 }

  - id: test_norm_cdf
    name: 正态CDF
    output: y_norm_cdf
    expression:
      op: norm_cdf
      args:
        - { ref: p1 }
        - { ref: p3 }
        - { ref: p4 }

  - id: test_norm_ppf
    name: 正态PPF
    output: y_norm_ppf
    expression:
      op: norm_ppf
      args:
        - { ref: p5 }
        - { ref: p3 }
        - { ref: p4 }

  - id: test_ndtr
    name: 正态CDF别名
    output: y_ndtr
    expression:
      op: ndtr
      args:
        - { ref: p1 }
        - { ref: p3 }
        - { ref: p4 }

  - id: test_ndtri
    name: 正态PPF别名
    output: y_ndtri
    expression:
      op: ndtri
      args:
        - { ref: p5 }
        - { ref: p3 }
        - { ref: p4 }

  - id: test_chi2_pdf
    name: 卡方PDF
    output: y_chi2_pdf
    expression:
      op: chi2_pdf
      args:
        - { ref: p1 }
        - { ref: p2 }

  - id: test_chi2_cdf
    name: 卡方CDF
    output: y_chi2_cdf
    expression:
      op: chi2_cdf
      args:
        - { ref: p1 }
        - { ref: p2 }

  - id: test_chi2_ppf
    name: 卡方PPF
    output: y_chi2_ppf
    expression:
      op: chi2_ppf
      args:
        - { ref: p5 }
        - { ref: p2 }

  - id: test_t_pdf
    name: t分布PDF
    output: y_t_pdf
    expression:
      op: t_pdf
      args:
        - { ref: p1 }
        - { ref: p2 }

  - id: test_t_cdf
    name: t分布CDF
    output: y_t_cdf
    expression:
      op: t_cdf
      args:
        - { ref: p1 }
        - { ref: p2 }

  - id: test_t_ppf
    name: t分布PPF
    output: y_t_ppf
    expression:
      op: t_ppf
      args:
        - { ref: p5 }
        - { ref: p2 }

  - id: test_f_pdf
    name: F分布PDF
    output: y_f_pdf
    expression:
      op: f_pdf
      args:
        - { ref: p1 }
        - { ref: p2 }
        - { ref: p2 }

  - id: test_f_cdf
    name: F分布CDF
    output: y_f_cdf
    expression:
      op: f_cdf
      args:
        - { ref: p1 }
        - { ref: p2 }
        - { ref: p2 }

  - id: test_f_ppf
    name: F分布PPF
    output: y_f_ppf
    expression:
      op: f_ppf
      args:
        - { ref: p5 }
        - { ref: p2 }
        - { ref: p2 }

  - id: test_binomial_pmf
    name: 二项PMF
    output: y_binomial_pmf
    expression:
      op: binomial_pmf
      args:
        - { ref: p2 }
        - { ref: p2 }
        - { ref: p5 }

  - id: test_binomial_cdf
    name: 二项CDF
    output: y_binomial_cdf
    expression:
      op: binomial_cdf
      args:
        - { ref: p2 }
        - { ref: p2 }
        - { ref: p5 }

  - id: test_poisson_pmf
    name: 泊松PMF
    output: y_poisson_pmf
    expression:
      op: poisson_pmf
      args:
        - { ref: p2 }
        - { ref: p4 }

  - id: test_poisson_cdf
    name: 泊松CDF
    output: y_poisson_cdf
    expression:
      op: poisson_cdf
      args:
        - { ref: p2 }
        - { ref: p4 }

  - id: test_exp_pdf
    name: 指数PDF
    output: y_exp_pdf
    expression:
      op: exp_pdf
      args:
        - { ref: p1 }
        - { ref: p4 }

  - id: test_exp_cdf
    name: 指数CDF
    output: y_exp_cdf
    expression:
      op: exponential_cdf
      args:
        - { ref: p1 }
        - { ref: p4 }
