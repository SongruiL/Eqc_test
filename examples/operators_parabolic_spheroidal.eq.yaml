# 抛物柱面和球扁旋转体函数测试
meta:
  id: OPERATORS_PARABOLIC_SPHEROIDAL
  model: ParabolicSpheroidalOperators
  name_cn: 抛物柱面和球扁旋转体函数测试
  version: "1.0"
  description: 测试抛物柱面和球扁旋转体波函数

parameters:
  p1:
    name_cn: 输入x
    dtype: float
    default: 1.0
  p2:
    name_cn: 阶数n
    dtype: float
    default: 1.0
  p3:
    name_cn: 参数c
    dtype: float
    default: 0.5

variables:
  y_pbdv:
    name_cn: 抛物柱面D
    dtype: float
    var_type: output
  y_pbvv:
    name_cn: 抛物柱面V
    dtype: float
    var_type: output
  y_pbwa:
    name_cn: 抛物柱面W
    dtype: float
    var_type: output
  y_parabolic_d:
    name_cn: 抛物柱面D别名
    dtype: float
    var_type: output
  y_parabolic_v:
    name_cn: 抛物柱面V别名
    dtype: float
    var_type: output
  y_parabolic_w:
    name_cn: 抛物柱面W别名
    dtype: float
    var_type: output
  y_pro_ang1:
    name_cn: 长旋转体角函数
    dtype: float
    var_type: output
  y_prolate_ang1:
    name_cn: 长旋转体角函数别名
    dtype: float
    var_type: output
  y_pro_rad1:
    name_cn: 长旋转体径函数1
    dtype: float
    var_type: output
  y_prolate_rad1:
    name_cn: 长旋转体径函数1别名
    dtype: float
    var_type: output
  y_pro_rad2:
    name_cn: 长旋转体径函数2
    dtype: float
    var_type: output
  y_prolate_rad2:
    name_cn: 长旋转体径函数2别名
    dtype: float
    var_type: output
  y_obl_ang1:
    name_cn: 扁旋转体角函数
    dtype: float
    var_type: output
  y_oblate_ang1:
    name_cn: 扁旋转体角函数别名
    dtype: float
    var_type: output
  y_obl_rad1:
    name_cn: 扁旋转体径函数1
    dtype: float
    var_type: output
  y_oblate_rad1:
    name_cn: 扁旋转体径函数1别名
    dtype: float
    var_type: output
  y_obl_rad2:
    name_cn: 扁旋转体径函数2
    dtype: float
    var_type: output
  y_oblate_rad2:
    name_cn: 扁旋转体径函数2别名
    dtype: float
    var_type: output

