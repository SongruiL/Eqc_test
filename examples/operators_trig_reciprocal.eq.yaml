# 倒数三角函数测试
meta:
  id: OPERATORS_TRIG_RECIPROCAL
  model: TrigReciprocalOperators
  name_cn: 倒数三角函数测试
  version: "1.0"
  description: 测试倒数三角函数（正割、余割、余切）

parameters:
  p1:
    name_cn: 角度x
    dtype: float
    default: 0.5
  p2:
    name_cn: 比值y
    dtype: float
    default: 1.5

variables:
  y_sec:
    name_cn: 正割
    dtype: float
    var_type: output
  y_csc:
    name_cn: 余割
    dtype: float
    var_type: output
  y_cot:
    name_cn: 余切
    dtype: float
    var_type: output
  y_asec:
    name_cn: 反正割
    dtype: float
    var_type: output
  y_acsc:
    name_cn: 反余割
    dtype: float
    var_type: output
  y_acot:
    name_cn: 反余切
    dtype: float
    var_type: output
  y_secant:
    name_cn: 正割别名
    dtype: float
    var_type: output
  y_cosecant:
    name_cn: 余割别名
    dtype: float
    var_type: output
  y_cotangent:
    name_cn: 余切别名
    dtype: float
    var_type: output

equations:
  - id: test_sec
    name: 正割函数
    output: y_sec
    expression:
      op: sec
      args:
        - { ref: p1 }

  - id: test_csc
    name: 余割函数
    output: y_csc
    expression:
      op: csc
      args:
        - { ref: p1 }

  - id: test_cot
    name: 余切函数
    output: y_cot
    expression:
      op: cot
      args:
        - { ref: p1 }

  - id: test_asec
    name: 反正割函数
    output: y_asec
    expression:
      op: asec
      args:
        - { ref: p2 }

  - id: test_acsc
    name: 反余割函数
    output: y_acsc
    expression:
      op: acsc
      args:
        - { ref: p2 }

  - id: test_acot
    name: 反余切函数
    output: y_acot
    expression:
      op: acot
      args:
        - { ref: p1 }

  - id: test_secant
    name: 正割别名
    output: y_secant
    expression:
      op: secant
      args:
        - { ref: p1 }

  - id: test_cosecant
    name: 余割别名
    output: y_cosecant
    expression:
      op: cosecant
      args:
        - { ref: p1 }

  - id: test_cotangent
    name: 余切别名
    output: y_cotangent
    expression:
      op: cotangent
      args:
        - { ref: p1 }
