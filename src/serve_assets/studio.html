<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EQC Studio</title>
<style>
  :root { --bg:#fafbfc; --card:#fff; --ink:#1f2933; --sub:#6b7280; --line:#e5e7eb; --accent:#2563eb; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif; }
  header { padding:12px 20px; background:var(--card); border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; gap:12px; }
  header h1 { font-size:18px; margin:0; }
  header .sub { color:var(--sub); font-size:13px; }
  header .badge { margin-left:auto; font-size:12px; color:var(--sub); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; padding:14px; align-items:start; }
  @media (max-width: 980px){ .grid { grid-template-columns:1fr; } }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .panel h2 { font-size:14px; margin:0; padding:10px 14px; border-bottom:1px solid var(--line); background:#f8fafc;
    display:flex; align-items:center; gap:8px; }
  .tools { margin-left:auto; display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .seg { display:inline-flex; border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .seg button { border:0; background:#fff; color:var(--sub); font-size:12px; padding:3px 11px; cursor:pointer; line-height:1.6; }
  .seg button + button { border-left:1px solid var(--line); }
  .seg button.active { background:var(--accent); color:#fff; }
  .seg button:hover:not(.active) { background:#eef2ff; }
  .btn { border:1px solid var(--line); background:#fff; color:var(--sub); font-size:12px; padding:3px 11px; border-radius:7px; cursor:pointer; line-height:1.6; }
  .btn:hover { background:#eef2ff; }
  .btn.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .panel .body { padding:12px 14px; }
  iframe { width:100%; height:620px; border:0; }
  /* 专注模式：全屏只看结构图，隐藏右侧曲线 */
  body.focus .grid { grid-template-columns:1fr; }
  body.focus .chart-panel { display:none; }
  body.focus #report { height: calc(100vh - 128px); }
  .chart-wrap { width:100%; overflow-x:auto; }
  .chart-wrap img { width:100%; max-width:720px; height:auto; display:block; }
  .vars { display:flex; flex-wrap:wrap; gap:6px 14px; max-height:150px; overflow-y:auto;
    border-top:1px solid var(--line); margin-top:10px; padding-top:10px; }
  .vars label { font-size:12px; display:flex; align-items:center; gap:4px; cursor:pointer; }
  .vars .cls { color:var(--sub); font-size:10px; }
  .vars .grp { width:100%; font-size:11px; color:var(--sub); font-weight:600; margin-top:4px; }
  .err { color:#dc2626; font-size:13px; }
  .hint { color:var(--sub); font-size:12px; margin-top:8px; }
  /* 情景探索器：调参数/初值 → 实时重算曲线 */
  .scn-head { display:flex; align-items:center; gap:8px; margin-top:14px; padding-top:10px;
    border-top:1px solid var(--line); font-size:13px; font-weight:600; }
  .scn-head .btn { margin-left:auto; }
  .scn-note { color:var(--sub); font-size:11px; font-weight:400; }
  .scenario { max-height:240px; overflow-y:auto; margin-top:8px; }
  .scn-grp { font-size:11px; color:var(--sub); font-weight:600; margin:8px 0 3px; }
  .scn-row { display:grid; grid-template-columns:96px 1fr 78px; align-items:center; gap:8px; margin:4px 0; }
  .scn-lab { font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .scn-row input[type=range] { width:100%; accent-color:var(--accent); }
  .scn-num { width:78px; font-size:12px; padding:2px 5px; border:1px solid var(--line); border-radius:5px; }
  .scn-row.changed .scn-lab { color:var(--accent); font-weight:600; }
  /* 节点悬停注释 */
  #nodeTip { position:fixed; z-index:1000; display:none; pointer-events:none; max-width:380px;
    background:var(--card); border:1px solid var(--line); border-radius:8px;
    box-shadow:0 8px 28px rgba(0,0,0,.14); padding:10px 12px; font-size:13px; color:var(--ink); }
  #nodeTip .t-name { font-weight:700; font-size:14px; }
  #nodeTip .t-sub { color:var(--sub); font-size:12px; margin-top:2px; }
  #nodeTip .t-desc { margin-top:6px; line-height:1.45; }
  #nodeTip .t-eq { margin-top:8px; overflow-x:auto; }
  #nodeTip .t-eq math { font-size:1.15em; }
  #nodeTip .t-cite { margin-top:6px; font-size:12px; color:#1d4ed8; }
  #nodeTip .t-cite.t-none { color:var(--sub); }
  /* 决策优化面板 */
  .opt-panel { margin:0 14px 14px; }
  .opt-panel input.spec { width:240px; font-size:12px; padding:3px 7px; border:1px solid var(--line); border-radius:6px; }
  .opt-grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; align-items:start; }
  @media (max-width: 980px){ .opt-grid { grid-template-columns:1fr; } }
  .opt-best b { color:var(--ink); }
  .opt-tbl { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
  .opt-tbl th, .opt-tbl td { text-align:left; padding:3px 8px; border-bottom:1px solid var(--line); }
  .opt-tbl th { color:var(--sub); font-weight:600; }
  .opt-cons { font-size:12px; margin-top:8px; }
  .opt-cons .ok { color:#16a34a; } .opt-cons .bad { color:#dc2626; }
  .opt-conv svg { width:100%; max-width:720px; height:auto; display:block; }
  .opt-summary { font-size:13px; margin-bottom:4px; }
  .opt-summary .feas-ok { color:#16a34a; font-weight:600; } .opt-summary .feas-bad { color:#dc2626; font-weight:600; }
</style>
</head>
<body>
<header>
  <h1 id="title">EQC Studio</h1>
  <span class="sub" id="subtitle"></span>
  <span class="badge" id="badge">连接中…</span>
</header>

<div class="grid">
  <section class="panel struct-panel">
    <h2>模型结构（Forrester 图 + 二维公式）
      <span class="tools">
        <span class="seg" id="layoutSeg" title="切换结构图布局">
          <button data-layout="forrester">Forrester</button>
          <button data-layout="force">力导向</button>
          <button data-layout="layered">分层</button>
        </span>
        <span class="seg" id="zoomSeg" title="缩放结构图（拖动滚动条平移）">
          <button data-zoom="out">−</button>
          <button data-zoom="fit">适应</button>
          <button data-zoom="in">+</button>
        </span>
        <button class="btn" id="focusBtn" title="专注：全屏只看结构图">⛶ 专注</button>
      </span>
    </h2>
    <iframe id="report" src="/api/report"></iframe>
  </section>

  <section class="panel chart-panel">
    <h2>整季仿真轨迹</h2>
    <div class="body">
      <div class="chart-wrap"><img id="chart" alt="trajectory chart"></div>
      <div class="hint" id="chartHint"></div>
      <div class="vars" id="vars"></div>
      <div class="scn-head">情景 <span class="scn-note">调参数/初值即实时重算</span>
        <button class="btn" id="scnReset">重置默认</button></div>
      <div class="scenario" id="scenario"></div>
    </div>
  </section>
</div>

<section class="panel opt-panel">
  <h2>决策优化（差分进化 DE）
    <span class="tools">
      <input class="spec" id="optSpec" placeholder="problem.yaml（相对模型目录）">
      <button class="btn" id="optRun">运行优化</button>
    </span>
  </h2>
  <div class="body">
    <div class="hint" id="optStatus">填入决策 spec 路径（见 docs/spec-optimization.md），点「运行优化」。DE 搜索可能数十秒（release 构建更快）。</div>
    <div class="opt-grid" id="optResult" style="display:none">
      <div id="optLeft"></div>
      <div class="opt-conv" id="optConv"></div>
    </div>
  </div>
</section>

<script>
let MODEL = null;

function setBadge(t, ok){ const b=document.getElementById('badge'); b.textContent=t; b.style.color = ok?'#16a34a':'#6b7280'; }

async function loadModel(){
  try {
    const r = await fetch('/api/model', {cache:'no-store'});
    const m = await r.json();
    MODEL = m;
    const mod = (m.modules && m.modules[0]) || {};
    document.getElementById('title').textContent = mod.name_cn || mod.model || 'EQC Studio';
    document.getElementById('subtitle').textContent = mod.id ? ('· ' + mod.id) : '';
    buildVarList(mod.variables || []);
    buildScenario(mod.parameters || [], mod.variables || []);
    setBadge('已连接', true);
  } catch(e){ setBadge('加载模型失败', false); }
}

function buildVarList(vars){
  const box = document.getElementById('vars');
  box.innerHTML = '';
  // 默认勾选：优先 Y，其次所有 output
  const hasY = vars.some(v=>v.name==='Y');
  const groups = {};
  vars.forEach(v=>{ (groups[v.class] = groups[v.class] || []).push(v); });
  const order = ['output','state','rate','auxiliary','semi_state','driving','parameter','control','boundary'];
  const seen = new Set();
  order.concat(Object.keys(groups)).forEach(cls=>{
    if(seen.has(cls) || !groups[cls]) return; seen.add(cls);
    const g = document.createElement('div'); g.className='grp'; g.textContent=cls; box.appendChild(g);
    groups[cls].forEach(v=>{
      const def = hasY ? (v.name==='Y') : (v.var_type==='output');
      const id = 'v_'+v.name;
      const lab = document.createElement('label');
      lab.innerHTML = `<input type="checkbox" id="${id}" value="${v.name}" ${def?'checked':''}><span>${v.name}</span><span class="cls">${v.unit||''}</span>`;
      lab.querySelector('input').addEventListener('change', (e)=>{ setHl(v.name, e.target.checked); updateChart(); });
      box.appendChild(lab);
    });
  });
  updateChart();
  syncAllHl();   // 默认勾选的变量（如 Y）节点也高亮
}

// —— 情景探索器：调参数/初值 → 实时重算曲线（覆盖经 /api/chart.svg?p=&init= 交给 EQC 重算）——
const OVR = {};   // 参数覆盖 name->值（仅存与默认不同者）
const IOVR = {};  // 初值覆盖
const DOVR = {};  // 驱动常量覆盖（driver_const 旋钮：把某驱动整列设成常数）
let _chartTimer = null;
function scheduleChart(){ clearTimeout(_chartTimer); _chartTimer = setTimeout(updateChart, 150); }
function overrideQuery(){
  const ps = Object.entries(OVR).map(([k,v])=>k+':'+v);
  const is = Object.entries(IOVR).map(([k,v])=>k+':'+v);
  const ds = Object.entries(DOVR).map(([k,v])=>k+':'+v);
  let q = '';
  if(ps.length) q += '&p=' + encodeURIComponent(ps.join(','));
  if(is.length) q += '&init=' + encodeURIComponent(is.join(','));
  if(ds.length) q += '&d=' + encodeURIComponent(ds.join(','));
  return q;
}
function ctrlRow(box, store, name, label, def){
  const d = Number(def);
  const lo = Math.min(0, 2*d), hi = (Math.max(0, 2*d) || 1);
  const step = (((hi-lo)/100) || 0.01);
  const row = document.createElement('div'); row.className = 'scn-row';
  row.innerHTML = '<span class="scn-lab" title="'+label.replace(/"/g,'')+'">'+name+'</span>'
    + '<input type="range" min="'+lo+'" max="'+hi+'" step="'+step+'" value="'+d+'">'
    + '<input type="number" step="'+step+'" value="'+d+'" class="scn-num">';
  const rng = row.querySelector('input[type=range]');
  const num = row.querySelector('input[type=number]');
  const apply = (val)=>{
    const v = Number(val);
    if(!Number.isFinite(v)) return;
    rng.value = v; num.value = v;
    if(v === d){ delete store[name]; row.classList.remove('changed'); }
    else { store[name] = v; row.classList.add('changed'); }
    scheduleChart();
  };
  rng.addEventListener('input', ()=>apply(rng.value));
  num.addEventListener('input', ()=>apply(num.value));
  box.appendChild(row);
}
function buildScenario(params, vars){
  const box = document.getElementById('scenario'); box.innerHTML = '';
  for(const k in OVR) delete OVR[k];
  for(const k in IOVR) delete IOVR[k];
  for(const k in DOVR) delete DOVR[k];
  // 向量参数（cohort 种子）不可被标量覆盖 → 情景面板跳过
  const scalarParams = (params||[]).filter(p=> !p.values);
  if(scalarParams.length){
    const h = document.createElement('div'); h.className='scn-grp'; h.textContent='参数'; box.appendChild(h);
    scalarParams.forEach(p=> ctrlRow(box, OVR, p.name, (p.name_cn||'') + (p.unit ? (' · '+p.unit) : ''), p.default));
  }
  // 只列真正的状态量初值（半状态 X_prev 等延迟寄存器是记账副本，不列）
  const inits = (vars||[]).filter(v=> v.init!==undefined && v.init!==null && v.class==='state');
  if(inits.length){
    const h = document.createElement('div'); h.className='scn-grp'; h.textContent='初值'; box.appendChild(h);
    inits.forEach(v=> ctrlRow(box, IOVR, v.name, '初值'+(v.unit ? (' · '+v.unit) : ''), v.init));
  }
}
function resetScenario(){
  const mod = (MODEL && MODEL.modules && MODEL.modules[0]) || {};
  buildScenario(mod.parameters || [], mod.variables || []);  // 重建即清空覆盖、控件复位
  updateChart();
}
document.getElementById('scnReset').addEventListener('click', resetScenario);

function updateChart(){
  const checked = Array.from(document.querySelectorAll('#vars input:checked')).map(i=>i.value);
  const img = document.getElementById('chart');
  const hint = document.getElementById('chartHint');
  if(checked.length===0){ img.removeAttribute('src'); hint.textContent='勾选变量以绘制轨迹。'; return; }
  hint.textContent = '绘制：' + checked.join(', ');
  img.src = '/api/chart.svg?vars=' + encodeURIComponent(checked.join(',')) + overrideQuery() + '&_=' + Date.now();
  img.onerror = ()=>{ hint.innerHTML = '<span class="err">无法绘制（可能未提供 --drivers，或模型有错）</span>'; };
}

// 自动刷新：监听 /__version，变化即整页重载（含 iframe 报告与图表）
let _ver = null;
setInterval(async ()=>{
  try {
    const t = await (await fetch('/__version',{cache:'no-store'})).text();
    if(_ver===null){ _ver=t; }
    else if(t!==_ver){ location.reload(); }
  } catch(e){}
}, 1000);

// 结构图布局切换：Forrester / 力导向 / 分层。选择存 localStorage，自动刷新后保留。
function applyLayout(kind){
  try { localStorage.setItem('eqc_layout', kind); } catch(e){}
  document.querySelectorAll('#layoutSeg button').forEach(b=>{
    b.classList.toggle('active', b.dataset.layout===kind);
  });
  document.getElementById('report').src = '/api/report?layout=' + encodeURIComponent(kind);
}
document.querySelectorAll('#layoutSeg button').forEach(b=>{
  b.addEventListener('click', ()=>applyLayout(b.dataset.layout));
});

// 缩放：控件在 Studio 工具栏，伸进同源 iframe 设置每张结构图 SVG 的显示宽度（容器自带滚动条平移）。
// zoom=1 即"适应面板宽"。报告本身仍零 JS（缩放是 Studio 行为，离线报告不受影响）。
let ZOOM = 1;
try { const z = parseFloat(localStorage.getItem('eqc_zoom')); if (z > 0) ZOOM = z; } catch(e){}
function applyZoom(){
  const f = document.getElementById('report');
  let doc;
  try { doc = f.contentDocument; } catch(e){ return; }
  if(!doc) return;
  doc.querySelectorAll('.dag-svg').forEach(svg=>{
    const cont = svg.closest('.dag');
    const cw = (cont ? cont.clientWidth : f.clientWidth) - 26;
    const vb = (svg.getAttribute('viewBox') || '0 0 1000 1000').split(/\s+/).map(parseFloat);
    const W = vb[2] || 1000, H = vb[3] || 1000;
    const w = Math.max(40, cw * ZOOM);
    svg.style.minWidth = '0';
    svg.style.width = w + 'px';
    svg.style.height = (w * H / W) + 'px';
  });
}
function setZoom(z){
  ZOOM = Math.max(0.2, Math.min(6, z));
  try { localStorage.setItem('eqc_zoom', String(ZOOM)); } catch(e){}
  applyZoom();
}
document.querySelectorAll('#zoomSeg button').forEach(b=>{
  b.addEventListener('click', ()=>{
    const a = b.dataset.zoom;
    if(a==='in') setZoom(ZOOM * 1.25);
    else if(a==='out') setZoom(ZOOM / 1.25);
    else setZoom(1); // 适应
  });
});
// 点节点联动：悬停弹注释（方程+备注），点击高亮+画轨迹。iframe 同源，Studio 伸进去挂事件（报告本身零 JS）。
const CLS_CN = {state:'存量',rate:'速率',driving:'驱动',auxiliary:'辅助',parameter:'参数',control:'控制',semi_state:'半状态',boundary:'边界'};
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function findVar(name){
  if(!MODEL) return null;
  for(const m of (MODEL.modules||[])){
    const v = (m.variables||[]).find(x=>x.name===name); if(v) return {kind:'var', v};
    const p = (m.parameters||[]).find(x=>x.name===name); if(p) return {kind:'param', p};
  }
  return null;
}
function findEq(name){
  if(!MODEL) return null;
  for(const m of (MODEL.modules||[])){
    const e = (m.equations||[]).find(x=>x.output===name); if(e) return e;
  }
  return null;
}
// 注释内容：全部取自已加载的 /api/model 契约（含方程 mathml）
function tipHtml(name){
  const info = findVar(name), eq = findEq(name);
  let h = '<div class="t-name">' + esc(name) + '</div>';
  if(info && info.kind==='var'){
    const v = info.v, cls = CLS_CN[v.class] || v.class;
    h += '<div class="t-sub">' + esc(cls) + (v.unit ? ' · ' + esc(v.unit) : '') + '</div>';
    if(v.description) h += '<div class="t-desc">' + esc(v.description) + '</div>';
  } else if(info && info.kind==='param'){
    const p = info.p;
    h += '<div class="t-sub">参数' + (p.unit ? ' · ' + esc(p.unit) : '') + '</div>';
    if(p.name_cn) h += '<div class="t-desc">' + esc(p.name_cn) + '</div>';
    h += '<div class="t-desc">默认值 = ' + p.default + '</div>';
  }
  if(eq){
    h += '<div class="t-eq">' + eq.mathml + '</div>';      // mathml 来自契约，浏览器原生渲染
    if(eq.reference) h += '<div class="t-cite">📖 ' + esc(eq.reference) + '</div>';
  } else if(info && info.kind!=='param'){
    h += '<div class="t-cite t-none">（无方程：输入/驱动量）</div>';
  }
  return h;
}
let TIP = null;
function showTip(name, x, y){
  if(!TIP){ TIP = document.createElement('div'); TIP.id = 'nodeTip'; document.body.appendChild(TIP); }
  TIP.innerHTML = tipHtml(name);
  TIP.style.display = 'block';
  const tw = TIP.offsetWidth, th = TIP.offsetHeight;
  let px = x + 14, py = y + 14;
  if(px + tw > window.innerWidth - 8) px = x - tw - 14;
  if(py + th > window.innerHeight - 8) py = window.innerHeight - th - 8;
  TIP.style.left = Math.max(8, px) + 'px';
  TIP.style.top = Math.max(8, py) + 'px';
}
function hideTip(){ if(TIP) TIP.style.display = 'none'; }

// 点击：切换选中（多选累加）。高亮节点+公式；可绘制变量同步勾选→曲线累加/取消。不滚动（注释已悬停可见）。
function reportDoc(){ const f = document.getElementById('report'); try { return f.contentDocument; } catch(e){ return null; } }
// 把某变量的高亮设为 on/off（Forrester + 角色DAG 同名节点 + 对应公式）
function setHl(name, on){
  const doc = reportDoc(); if(!doc) return;
  const q = String(name).replace(/"/g,'');
  doc.querySelectorAll('[data-var="'+q+'"]').forEach(e=> e.classList.toggle('hl', on));
  const eq = doc.querySelector('.eq[data-output="'+q+'"]');
  if(eq) eq.classList.toggle('hl', on);
}
// 把所有节点高亮同步到当前复选框状态（加载/切布局/手动改复选框后调用）
function syncAllHl(){ document.querySelectorAll('#vars input').forEach(cb=> setHl(cb.value, cb.checked)); }
function selectVar(name){
  if(!name) return;
  const cb = document.querySelector('#vars input[value="'+String(name).replace(/"/g,'')+'"]');
  if(cb){                                    // 可绘制变量：切换勾选 → 高亮 + 曲线累加/取消
    cb.checked = !cb.checked;
    setHl(name, cb.checked);
    updateChart();
  } else {                                   // 参数/驱动（无复选框）：仅切换高亮
    const doc = reportDoc();
    const on = !(doc && doc.querySelector('[data-var="'+String(name).replace(/"/g,'')+'"].hl'));
    setHl(name, on);
  }
}
function wireNodeClicks(){
  const f = document.getElementById('report');
  let doc; try { doc = f.contentDocument; } catch(e){ return; }
  if(!doc) return;
  doc.querySelectorAll('[data-var]').forEach(g=>{
    if(g._wired) return; g._wired = true;
    const name = g.getAttribute('data-var');
    g.addEventListener('mouseenter', ()=>{
      const fr = f.getBoundingClientRect(), nr = g.getBoundingClientRect();  // nr 含 iframe 内滚动/缩放
      showTip(name, fr.left + nr.right, fr.top + nr.top);
    });
    g.addEventListener('mouseleave', hideTip);
    g.addEventListener('click', ()=>{ if(doc._suppressClick) return; selectVar(name); });
  });
  wirePan(doc);
}

// 交互：拖**背景**=平移画布（横向滚 .dag、纵向滚 iframe 窗口）；拖**节点方框**=移动它、连线跟随
// （会话内有效，刷新/换布局复位——相当于临时手动错开遮挡）。拖动超阈值则抑制随后的点击（避免误选）。
function wirePan(doc){
  if(doc._panWired) return; doc._panWired = true;
  const win = document.getElementById('report').contentWindow;
  let mode=null, sx=0, sy=0, dag=null, moved=false;
  let node=null, svg=null, startTx=0, startTy=0, startU=null;

  const userPt = (s,e)=>{ const pt=s.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
    const m=s.getScreenCTM(); return m? pt.matrixTransform(m.inverse()) : {x:e.clientX,y:e.clientY}; };
  const center = (g)=>({ cx:+g.dataset.cx+(+g.dataset.tx||0), cy:+g.dataset.cy+(+g.dataset.ty||0),
    hw:+g.dataset.hw||60, hh:+g.dataset.hh||20 });
  const boxExit = (c,tx,ty)=>{ const dx=tx-c.cx, dy=ty-c.cy;
    if(Math.abs(dx)<1e-6 && Math.abs(dy)<1e-6) return [c.cx,c.cy];
    const ex=Math.abs(dx)<1e-6?Infinity:c.hw/Math.abs(dx), ey=Math.abs(dy)<1e-6?Infinity:c.hh/Math.abs(dy);
    const t=Math.min(ex,ey); return [c.cx+dx*t, c.cy+dy*t]; };
  // 重算与某节点相连的边（中心到框边 + 微弯，与 Rust 自由布局一致）
  function reEdges(g){
    const id=(g.dataset.id||'').replace(/"/g,''), s=g.ownerSVGElement; if(!id||!s) return;
    s.querySelectorAll('[data-from="'+id+'"],[data-to="'+id+'"]').forEach(p=>{
      const a=s.querySelector('[data-id="'+(p.dataset.from||'').replace(/"/g,'')+'"]');
      const b=s.querySelector('[data-id="'+(p.dataset.to||'').replace(/"/g,'')+'"]');
      if(!a||!b) return;
      const ca=center(a), cb=center(b);
      const [x1,y1]=boxExit(ca,cb.cx,cb.cy), [x2,y2]=boxExit(cb,ca.cx,ca.cy);
      const dx=x2-x1, dy=y2-y1, len=Math.max(1,Math.hypot(dx,dy));
      const nx=-dy/len, ny=dx/len, bow=Math.min(26,len*0.12);
      const mx=(x1+x2)/2+nx*bow, my=(y1+y2)/2+ny*bow;
      p.setAttribute('d','M'+x1.toFixed(0)+','+y1.toFixed(0)+' Q'+mx.toFixed(0)+','+my.toFixed(0)+' '+x2.toFixed(0)+','+y2.toFixed(0));
    });
  }

  doc.addEventListener('mousedown', (e)=>{
    if(e.button!==0) return;
    moved=false; sx=e.clientX; sy=e.clientY;
    const g = e.target.closest ? e.target.closest('[data-var]') : null;
    if(g){                                  // 拖节点
      mode='node'; node=g; svg=g.ownerSVGElement;
      startTx=+g.dataset.tx||0; startTy=+g.dataset.ty||0; startU=userPt(svg,e);
      hideTip(); doc.body.style.cursor='grabbing'; e.preventDefault();
    } else {                                // 拖背景=平移
      mode='pan'; dag = e.target.closest ? e.target.closest('.dag') : null;
      if(dag){ doc.body.style.cursor='grabbing'; e.preventDefault(); }
    }
  });
  doc.addEventListener('mousemove', (e)=>{
    if(!mode) return;
    if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4) moved=true;
    if(mode==='node'){
      const u=userPt(svg,e);
      node.dataset.tx = startTx + (u.x-startU.x);
      node.dataset.ty = startTy + (u.y-startU.y);
      node.setAttribute('transform','translate('+(+node.dataset.tx)+','+(+node.dataset.ty)+')');
      reEdges(node);
    } else {
      if(dag) dag.scrollLeft -= (e.clientX-sx);
      win.scrollBy(0, -(e.clientY-sy));
      sx=e.clientX; sy=e.clientY;
    }
  });
  const end=()=>{
    if(!mode) return;
    mode=null; node=null; svg=null; doc.body.style.cursor='';
    if(moved){ doc._suppressClick=true; setTimeout(()=>{ doc._suppressClick=false; }, 0); }
  };
  doc.addEventListener('mouseup', end);
  doc.addEventListener('mouseleave', end);
}

// iframe 每次加载（含切布局）后：重新适配 + 重新挂点击 + 同步高亮 + 收起注释；窗口尺寸变化时重新适配。
function onReportLoad(){ hideTip(); applyZoom(); wireNodeClicks(); syncAllHl(); }
document.getElementById('report').addEventListener('load', onReportLoad);
window.addEventListener('resize', applyZoom);

// 专注：全屏只看结构图，再点恢复双栏。
document.getElementById('focusBtn').addEventListener('click', ()=>{
  const on = document.body.classList.toggle('focus');
  const btn = document.getElementById('focusBtn');
  btn.textContent = on ? '⛶ 退出专注' : '⛶ 专注';
  btn.classList.toggle('on', on);
  setTimeout(applyZoom, 60); // 容器宽度变了，重新适配
});

// —— 决策优化：填 spec 路径 → 跑 /api/optimize（转圈等待）→ 显示最优旋钮 + 收敛曲线 + 可叠加最优轨迹 ——
function fmtNum(x){ const v=Number(x); if(!Number.isFinite(v)) return String(x);
  return (Math.abs(v)>=1000||Math.abs(v)<0.001&&v!==0) ? v.toExponential(3) : v.toFixed(4); }
const KIND_CN = {param:'参数', init:'初值', driver_const:'恒定驱动'};
async function runOptimize(){
  const spec = document.getElementById('optSpec').value.trim();
  const status = document.getElementById('optStatus');
  const grid = document.getElementById('optResult');
  if(!spec){ status.innerHTML = '<span class="err">请填决策 spec 路径（相对模型所在目录）。</span>'; return; }
  const btn = document.getElementById('optRun');
  btn.disabled = true; status.textContent = '⏳ 运行中…（DE 搜索，可能数十秒；编辑模型时优化暂不可用）';
  try {
    const r = await fetch('/api/optimize?spec=' + encodeURIComponent(spec) + '&_=' + Date.now(), {cache:'no-store'});
    const j = await r.json();
    if(j.error){ status.innerHTML = '<span class="err">优化失败：' + esc(j.error) + '</span>'; grid.style.display='none'; return; }
    status.textContent = '✅ 完成（' + (j.optimizer? ('DE pop='+j.optimizer.pop+' iters='+j.optimizer.iters+' seed='+j.optimizer.seed) : '') + '）';
    renderOptResult(j);
  } catch(e){ status.innerHTML = '<span class="err">优化请求失败：' + esc(e) + '</span>'; grid.style.display='none'; }
  finally { btn.disabled = false; }
}
function renderOptResult(j){
  const grid = document.getElementById('optResult'); grid.style.display='';
  const feas = j.feasible ? '<span class="feas-ok">可行 ✓</span>' : '<span class="feas-bad">违反约束 ✗</span>';
  let left = '<div class="opt-summary"><b>目标值（' + esc(j.objective.sense) + '）：</b>'
    + (j.objective_value!=null ? fmtNum(j.objective_value) : '—') + '　' + feas + '</div>';
  left += '<table class="opt-tbl"><tr><th>旋钮</th><th>最优值</th><th>种类</th><th>边界</th></tr>';
  (j.best_knobs||[]).forEach(k=>{
    left += '<tr><td>' + esc(k.var) + '</td><td>' + fmtNum(k.value) + (k.unit?(' '+esc(k.unit)):'')
      + '</td><td>' + (KIND_CN[k.kind]||esc(k.kind)) + '</td><td>['
      + fmtNum(k.bounds[0]) + ', ' + fmtNum(k.bounds[1]) + ']</td></tr>';
  });
  left += '</table>';
  if(j.constraints && j.constraints.length){
    left += '<div class="opt-cons"><b>约束：</b>';
    j.constraints.forEach(c=>{
      const ok = c.satisfied;
      left += '<div class="' + (ok?'ok':'bad') + '">' + (ok?'✓':'✗') + ' ' + esc(c.expr)
        + ' = ' + fmtNum(c.value) + ' ≤ ' + fmtNum(c.max) + (ok?'':(' （违反 '+fmtNum(c.violation)+'）')) + '</div>';
    });
    left += '</div>';
  }
  left += '<button class="btn" id="optApply" style="margin-top:10px">叠加最优旋钮到曲线</button>'
    + '<span class="scn-note" style="margin-left:8px">把最优旋钮喂回情景、重画整季轨迹</span>';
  document.getElementById('optLeft').innerHTML = left;
  document.getElementById('optConv').innerHTML = j.convergence_svg || '';
  const ap = document.getElementById('optApply');
  if(ap) ap.addEventListener('click', ()=>applyBestKnobs(j.best_knobs));
}
// 把最优旋钮喂回情景覆盖（param→OVR、init→IOVR、driver_const→DOVR），重画曲线
function applyBestKnobs(knobs){
  (knobs||[]).forEach(k=>{
    if(k.kind==='param') OVR[k.var] = k.value;
    else if(k.kind==='init') IOVR[k.var] = k.value;
    else if(k.kind==='driver_const') DOVR[k.var] = k.value;
  });
  // 同步情景面板里已有控件的显示值（driver_const 无控件，仅影响曲线）
  document.querySelectorAll('#scenario .scn-row').forEach(row=>{
    const name = row.querySelector('.scn-lab') ? row.querySelector('.scn-lab').textContent : '';
    const val = (name in OVR) ? OVR[name] : (name in IOVR ? IOVR[name] : null);
    if(val!=null){ const rng=row.querySelector('input[type=range]'), num=row.querySelector('input[type=number]');
      if(rng) rng.value=val; if(num) num.value=val; row.classList.add('changed'); }
  });
  updateChart();
  document.getElementById('optStatus').textContent = '已把最优旋钮叠加到「整季仿真轨迹」（情景面板已更新；重置默认可还原）。';
}
document.getElementById('optRun').addEventListener('click', runOptimize);

let _savedLayout = 'layered';
try { _savedLayout = localStorage.getItem('eqc_layout') || 'layered'; } catch(e){}
applyLayout(_savedLayout);

loadModel();
</script>
